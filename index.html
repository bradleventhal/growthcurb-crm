<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteDrop CRM v2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>SiteDrop CRM <span class="v2">v2</span></h1>
      <p>Pipeline, client ops, activity, and MRR command center</p>
    </div>
    <button id="addClientBtn" class="btn-primary">+ Add Client</button>
  </header>

  <section class="metrics" id="metrics"></section>

  <section class="filters card">
    <div class="filter-grid">
      <label>Status
        <select id="filterStatus"><option value="">All</option></select>
      </label>
      <label>Vertical
        <select id="filterCategory"><option value="">All</option></select>
      </label>
      <label>Location
        <select id="filterLocation"><option value="">All</option></select>
      </label>
      <label>Search
        <input id="filterSearch" placeholder="Business name, notes, website..." />
      </label>
    </div>
  </section>

  <main class="pipeline" id="pipeline"></main>

  <dialog id="clientDialog">
    <form id="clientForm" method="dialog">
      <h3>Add Client</h3>
      <div class="form-grid">
        <label>Business Name<input name="name" required /></label>
        <label>Category<input name="category" required /></label>
        <label>Location<input name="location" required /></label>
        <label>Website URL<input name="website" placeholder="https://..." /></label>
        <label>Website Status<input name="websiteStatus" placeholder="NONE / Needs verification / Exists" /></label>
        <label>Contact Name<input name="contactName" /></label>
        <label>Email<input name="email" type="email" /></label>
        <label>Phone<input name="phone" /></label>
        <label>Pipeline Status
          <select name="pipelineStatus">
            <option>Lead</option><option>Contacted</option><option>Demo Sent</option>
            <option>Interested</option><option>Closed</option><option>Active</option>
          </select>
        </label>
        <label>Site Build Status
          <select name="siteBuildStatus">
            <option>Not Started</option><option>Building</option><option>QA</option>
            <option>Deployed</option><option>Live</option>
          </select>
        </label>
        <label>Package Selected
          <select name="packageSelected">
            <option>Starter</option><option>Growth</option><option>Pro</option>
          </select>
        </label>
        <label>Monthly Spend ($)<input name="monthlySpend" type="number" step="0.01" min="0" value="0" /></label>
        <label>Site URL<input name="siteUrl" placeholder="https://..." /></label>
        <label>Launch Date<input name="launchDate" type="date" /></label>
      </div>
      <label>Notes<textarea name="notes" rows="3"></textarea></label>
      <menu>
        <button value="cancel">Cancel</button>
        <button class="btn-primary" id="saveClientBtn" value="default">Save Client</button>
      </menu>
    </form>
  </dialog>

  <dialog id="detailDialog">
    <article id="detailContent"></article>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
